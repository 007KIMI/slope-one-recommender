# ============================================================
# Spark Cluster Configuration — Cluster-09
# ============================================================
#
# Copy this file to $SPARK_HOME/conf/spark-defaults.conf
# on EVERY node in the cluster before starting Spark.
#
# Replace <MASTER_HAMACHI_IP> with the Hamachi IP of the
# machine running the master node.
#
# Find your Hamachi IP: open Hamachi app and look for
# the IP under your machine name (e.g. 25.x.x.x)
# ============================================================

# Master address (use Hamachi virtual IP, not local IP)
spark.master                        spark://<MASTER_HAMACHI_IP>:7077

# Memory per executor (adjust based on your machine's RAM)
spark.executor.memory               3g
spark.driver.memory                 2g

# Cores per executor
spark.executor.cores                2

# Shuffle partitions (3x number of total executor cores)
spark.sql.shuffle.partitions        50

# Serializer
spark.serializer                    org.apache.spark.serializer.KryoSerializer

# Application UI port
spark.ui.port                       4050

# Network timeouts (important over VPN)
spark.network.timeout               600s
spark.executor.heartbeatInterval    60s

# Memory tuning
spark.memory.fraction               0.8
spark.memory.storageFraction        0.2

# Fault tolerance
spark.task.maxFailures              8
spark.shuffle.spill                 true
